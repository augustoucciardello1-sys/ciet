<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Catálogo de productos — IPS | CIET</title>
<meta name="description" content="Catálogo completo de la canasta del Índice de Precios de Supermercados de Tucumán: precio de cada producto en cada cadena.">
<style>
  :root {
    --bg: #0f1420; --panel: #1a2233; --panel-2: #212c42; --text: #e8ecf4;
    --muted: #93a0b8; --accent: #ef5350; --green: #66bb6a; --border: #2c3a55;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; min-height: 100vh; padding: 20px; line-height: 1.6; }
  .wrap { max-width: 900px; margin: 0 auto; }
  nav a { color: var(--muted); font-size: 0.8rem; text-decoration: none; }
  header { padding: 18px 0 18px; }
  h1 { font-size: 1.5rem; font-weight: 800; }
  h1 span { color: var(--accent); }
  .subtitle { color: var(--muted); font-size: 0.9rem; margin-top: 6px; }
  .controls { display: flex; flex-wrap: wrap; gap: 10px; align-items: center; margin: 16px 0; }
  input[type=search] { flex: 1; min-width: 200px; background: var(--panel); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 0.9rem; }
  input[type=search]::placeholder { color: var(--muted); }
  select { background: var(--panel); border: 1px solid var(--border); border-radius: 8px; color: var(--text); padding: 10px 12px; font-size: 0.85rem; }
  .count { font-size: 0.8rem; color: var(--muted); margin-bottom: 10px; }
  .panel { background: var(--panel); border: 1px solid var(--border); border-radius: 12px; overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  th, td { text-align: left; padding: 9px 10px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  th { color: var(--muted); font-size: 0.7rem; text-transform: uppercase; letter-spacing: 0.05em; position: sticky; top: 0; background: var(--panel); cursor: pointer; user-select: none; }
  th.num, td.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.desc { white-space: normal; min-width: 200px; }
  td.min { color: var(--green); font-weight: 700; }
  td.max { color: var(--accent); }
  .gap { color: var(--accent); font-weight: 700; }
  .var.up { color: var(--accent); font-weight: 600; }
  .var.down { color: var(--green); font-weight: 600; }
  .more { text-align: center; padding: 16px; }
  .more button { background: var(--panel-2); border: 1px solid var(--border); color: var(--text); border-radius: 8px; padding: 9px 18px; cursor: pointer; font-size: 0.85rem; }
  .more button:hover { border-color: var(--accent); }
  footer { margin: 28px 0 12px; color: var(--muted); font-size: 0.76rem; }
  #estado { color: var(--muted); padding: 30px 0; }
</style>
</head>
<body>
<div class="wrap">

  <nav><a href="./">← Índice de Precios de Supermercados de Tucumán</a></nav>

  <header>
    <h1>Catálogo completo de <span>productos</span></h1>
    <p class="subtitle" id="subtitle">Cargando…</p>
  </header>

  <div id="estado">Cargando catálogo…</div>

  <div id="contenido" style="display:none">
    <div class="controls">
      <input type="search" id="q" placeholder="Buscar producto (ej: leche, aceite, fideos)…">
      <select id="orden">
        <option value="brecha">Ordenar: mayor brecha</option>
        <option value="max">Mayor precio</option>
        <option value="min">Menor precio</option>
        <option value="var">Mayor suba semanal</option>
        <option value="alfa">Alfabético</option>
      </select>
    </div>
    <div class="count" id="count"></div>
    <div class="panel">
      <table id="tabla"><thead></thead><tbody></tbody></table>
    </div>
    <div class="more" id="more" style="display:none">
      <button id="btn-more">Mostrar más productos</button>
    </div>
  </div>

  <footer>
    CIET — Centro de Investigación Económica de Tucumán · Datos: SEPA (CC-BY 4.0) · Elaboración propia.
  </footer>

</div>

<script>
const $ = id => document.getElementById(id);
const peso = v => '$' + v.toLocaleString('es-AR', { maximumFractionDigits: 0 });
const pct = v => (v > 0 ? '+' : '') + v.toLocaleString('es-AR', { maximumFractionDigits: 1 }) + '%';
const PAGINA = 50;

let PRODUCTOS = [], CADENAS = [], filtrados = [], mostrados = 0;

fetch('../data/productos.json')
  .then(r => { if (!r.ok) throw new Error(r.status); return r.json(); })
  .then(d => {
    PRODUCTOS = d.productos;
    CADENAS = d.cadenas_principales;
    $('estado').style.display = 'none';
    $('contenido').style.display = 'block';
    $('subtitle').textContent = `${PRODUCTOS.length.toLocaleString('es-AR')} productos idénticos comparados entre ${CADENAS.join(', ')} · datos al ${new Date(d.fecha + 'T12:00:00').toLocaleDateString('es-AR', { day: 'numeric', month: 'long', year: 'numeric' })}`;

    $('tabla').querySelector('thead').innerHTML =
      '<tr><th>Producto</th>' +
      CADENAS.map(c => `<th class="num">${c}</th>`).join('') +
      '<th class="num">Brecha</th><th class="num">Sem.</th></tr>';

    $('q').addEventListener('input', aplicar);
    $('orden').addEventListener('change', aplicar);
    $('btn-more').addEventListener('click', () => { mostrados += PAGINA; pintar(); });
    aplicar();
  })
  .catch(err => { $('estado').textContent = 'No se pudo cargar el catálogo (' + err.message + ').'; });

function aplicar() {
  const q = $('q').value.trim().toLowerCase();
  filtrados = q ? PRODUCTOS.filter(p => p.descripcion.toLowerCase().includes(q)) : PRODUCTOS.slice();
  const orden = $('orden').value;
  const cmp = {
    brecha: (a, b) => b.brecha - a.brecha,
    max: (a, b) => b.max - a.max,
    min: (a, b) => a.min - b.min,
    var: (a, b) => (b.var_pct ?? -1e9) - (a.var_pct ?? -1e9),
    alfa: (a, b) => a.descripcion.localeCompare(b.descripcion, 'es'),
  }[orden];
  filtrados.sort(cmp);
  mostrados = PAGINA;
  pintar();
}

function pintar() {
  const tb = $('tabla').querySelector('tbody');
  const slice = filtrados.slice(0, mostrados);
  tb.innerHTML = slice.map(p => {
    const celdas = CADENAS.map(c => {
      const v = p.precios[c];
      const cls = v === p.min ? 'num min' : (v === p.max ? 'num max' : 'num');
      return `<td class="${cls}">${peso(v)}</td>`;
    }).join('');
    const varHtml = p.var_pct === null || p.var_pct === undefined
      ? '<td class="num">—</td>'
      : `<td class="num"><span class="var ${p.var_pct >= 0 ? 'up' : 'down'}">${pct(p.var_pct)}</span></td>`;
    return `<tr><td class="desc">${p.descripcion}</td>${celdas}<td class="num"><span class="gap">×${p.brecha.toLocaleString('es-AR', { maximumFractionDigits: 1 })}</span></td>${varHtml}</tr>`;
  }).join('');
  $('count').textContent = `${filtrados.length.toLocaleString('es-AR')} producto${filtrados.length === 1 ? '' : 's'}` +
    (filtrados.length > mostrados ? ` · mostrando ${mostrados}` : '');
  $('more').style.display = filtrados.length > mostrados ? 'block' : 'none';
}
</script>
</body>
</html>
